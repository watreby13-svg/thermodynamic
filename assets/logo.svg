<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <clipPath id="half">
      <rect x="0" y="0" width="16" height="32"/>
    </clipPath>
    <clipPath id="half2">
      <rect x="16" y="0" width="16" height="32"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="8" fill="#1e293b"/>
  <rect x="0" y="0" width="16" height="32" fill="url(#hot)" clip-path="url(#half)" rx="8"/>
  <rect x="16" y="0" width="16" height="32" fill="url(#cold)" clip-path="url(#half2)" rx="8"/>
  <rect x="0" y="0" width="32" height="32" rx="8" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
  <text x="16" y="22.5" text-anchor="middle" fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="16" letter-spacing="-.5">T</text>
  <text x="7" y="6" font-size="6" fill="#fbbf24" font-family="system-ui,sans-serif">🔥</text>
  <text x="21" y="6" font-size="6" fill="#93c5fd" font-family="system-ui,sans-serif">❄️</text>
</svg>
